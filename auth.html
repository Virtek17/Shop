<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Авторизация и Регистрация</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-wrapper">
        <div class="auth-form-box">
          <form id="registerForm">
            <h2>Регистрация</h2>
            <input id="name" type="text" placeholder="Имя" />
            <input id="email" type="email" placeholder="Email" />
            <input id="password" type="password" placeholder="Пароль" />
            <button type="submit">Зарегистрироваться</button>
            <p class="form-link">
              Уже есть аккаунт? <a href="#" class="toggle-form">Войти</a>
            </p>
          </form>

          <form id="loginForm" style="display: none">
            <h2>Вход</h2>
            <input id="loginEmail" type="email" placeholder="Email" required />
            <input
              id="loginPassword"
              type="password"
              placeholder="Пароль"
              required
            />
            <button type="submit">Войти</button>
            <p class="form-link">
              Нет аккаунта?
              <a href="#" class="toggle-form">Зарегистрироваться</a>
            </p>
          </form>
        </div>

        <div class="auth-info">
          <h1>Добро пожаловать!</h1>
          <p>
            Войдите или зарегистрируйтесь, чтобы получить доступ к нашему
            каталогу товаров
          </p>
          <a href="index.html" class="catalog-link">Перейти в каталог →</a>
        </div>
      </div>
    </div>

    <script src="users.js"></script>
    <script>
      // Переключение между формами регистрации и входа
      const toggleLinks = document.querySelectorAll(".toggle-form");
      const registerForm = document.getElementById("registerForm");
      const loginForm = document.getElementById("loginForm");

      toggleLinks.forEach((link) => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          registerForm.style.display =
            registerForm.style.display === "none" ? "block" : "none";
          loginForm.style.display =
            loginForm.style.display === "none" ? "block" : "none";
        });
      });
    </script>
  </body>
</html>
